services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: guitar_tone_advisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guitar_tone_advisor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
